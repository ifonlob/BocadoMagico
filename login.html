<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bocado Mágico | Sistema de logueo</title>
    <link rel="stylesheet" href="./assets/css/styles.css">
</head>
<body>
    <article class="login">
        <h1 class="login__titulo">Login</h1>
        <form action="#post" class = "login__formulario">
            <label class="login__etiqueta">Usuario
                <input class="login__usuario" type="text" required>
            </label>
            <label class="login__etiqueta">Contraseña
                <input class="login__contrasena" type="text" required>
            </label>
            <button class= "login__boton" type="submit">Acceder</button>
        </form>
    </article>
</body>
</html>
